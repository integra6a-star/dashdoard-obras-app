<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamento de Produção</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

.container{
  max-width:600px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.status{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Lançamento de Produção</h1>

  <select id="obra">
    <option value="">Selecione a obra</option>
  </select>

  <input type="date" id="data">
  <input type="text" id="frente" placeholder="Tipo (Rede, PV...)">
  <input type="text" id="equipe" placeholder="Equipe">
  <input type="number" id="extensao" placeholder="Extensão (m)">

  <button onclick="salvar()">Salvar Produção</button>

  <div class="status" id="status"></div>
</div>

<script>
const SUPABASE_URL = "https://mwmsjqaudpsmtmstoqkc.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_5BAcKHMSYilWh-pwcg2DHw_x2wiYqqY";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// carregar obras
async function carregarObras(){
  const { data } = await supabase.from('obras').select('*');

  const select = document.getElementById("obra");
  select.innerHTML = '<option value="">Selecione a obra</option>';

  (data || []).forEach(o=>{
    select.innerHTML += `<option value="${o.id}">${o.nome}</option>`;
  });
}

// salvar produção
async function salvar(){

  const obra = document.getElementById("obra").value;
  const data = document.getElementById("data").value;
  const frente = document.getElementById("frente").value;
  const equipe = document.getElementById("equipe").value;
  const extensao = document.getElementById("extensao").value;

  const status = document.getElementById("status");

  const { error } = await supabase.from('producao_diaria').insert([{
    obra_id: Number(obra),
    Data: data,
    frente: frente,
    equipe: equipe,
    extensao_m: Number(extensao)
  }]);

  if(error){
    status.innerHTML = "❌ Erro ao salvar";
    status.style.color = "red";
  }else{
    status.innerHTML = "✅ Salvo com sucesso";
    status.style.color = "green";
  }
}

carregarObras();
</script>

</body>
</html>
