<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema de Produção</title>
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #0d6efd;
      --primary-dark: #0b5ed7;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
      --success: #198754;
      --danger: #b02a37;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, rgba(13,110,253,0.08), rgba(13,110,253,0.02)), var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
    }

    .login-shell {
      width: 100%;
      max-width: 440px;
    }

    .brand {
      text-align: center;
      margin-bottom: 18px;
    }

    .brand h1 {
      margin: 0;
      font-size: 30px;
      color: var(--primary);
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .login-box {
      width: 100%;
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(13,110,253,0.08);
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .section-subtitle {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(13,110,253,0.12);
    }

    button {
      margin-top: 18px;
      background: var(--primary);
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .msg {
      margin-top: 14px;
      font-weight: bold;
      white-space: pre-line;
      min-height: 20px;
    }

    .ok { color: var(--success); }
    .erro { color: var(--danger); }
    .info { color: var(--primary); }

    .ajuda {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      background: #f8fbff;
      border: 1px solid #e2ecfb;
      border-radius: 12px;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="brand">
      <h1>Integra 6A</h1>
      <p>Sistema de Produção</p>
    </div>

    <div class="login-box">
      <h2 class="section-title">Entrar</h2>
      <p class="section-subtitle">Acesse o painel da obra com seu usuário.</p>

      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seuemail@dominio.com" />

      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />

      <button id="btnLogin" type="button">Entrar</button>

      <div id="msg" class="msg"></div>

      <div class="ajuda">
        Primeiro acesso: seu usuário precisa existir no Supabase Auth.
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = window.supabase.createClient(
      "https://mhgcuzltxwkzezonqcyz.supabase.co",
      "sb_publishable_aUXMKggmg99icSo5hRUZUg_2WF_qdEA"
    );

    const elEmail = document.getElementById("email");
    const elSenha = document.getElementById("senha");
    const elBtnLogin = document.getElementById("btnLogin");
    const elMsg = document.getElementById("msg");

    function setMsg(texto, tipo = "info") {
      elMsg.textContent = texto;
      elMsg.className = "msg " + tipo;
    }

    async function login() {
      const email = elEmail.value.trim();
      const senha = elSenha.value;

      if (!email) return setMsg("Digite o e-mail.", "erro");
      if (!senha) return setMsg("Digite a senha.", "erro");

      elBtnLogin.disabled = true;
      setMsg("Entrando...", "info");

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password: senha
      });

      if (error) {
        setMsg("Erro no login: " + error.message, "erro");
        elBtnLogin.disabled = false;
        return;
      }

      setMsg("Login realizado com sucesso.", "ok");
      window.location.href = "/dashboard";
    }

    elBtnLogin.addEventListener("click", login);
  </script>
</body>
</html>
