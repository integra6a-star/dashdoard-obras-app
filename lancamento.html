<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lançamento de Produção</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --primary: #0d6efd;
      --primary-dark: #0b5ed7;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ef;
      --success: #198754;
      --danger: #b02a37;
      --shadow: 0 8px 24px rgba(0,0,0,0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      padding: 0;
      background: var(--bg);
      margin: 0;
      color: var(--text);
    }

    .topbar {
      background: linear-gradient(135deg, var(--primary), #3a86ff);
      color: white;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand-wrap h1 { margin: 0; font-size: 22px; }
    .brand-wrap p { margin: 4px 0 0; opacity: 0.9; font-size: 14px; }

    .nav { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .nav a, .nav button {
      color: white;
      text-decoration: none;
      font-weight: bold;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      font-size: 14px;
      padding: 10px 14px;
      border-radius: 12px;
    }
    .nav a.ativo { background: rgba(255,255,255,0.24); }

    .container {
      padding: 24px;
      max-width: 980px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    h2 { margin-top: 0; margin-bottom: 18px; }

    .msg {
      margin: 0 0 14px;
      font-weight: bold;
      white-space: pre-line;
      min-height: 18px;
    }
    .ok { color: var(--success); }
    .erro { color: var(--danger); }
    .info { color: var(--primary); }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    select, input, button.form-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }

    .form-btn {
      margin-top: 18px;
      background: var(--primary);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .form-btn:hover { background: var(--primary-dark); }
    .form-btn:disabled { opacity: 0.75; cursor: wait; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand-wrap">
      <h1>Integra 6A</h1>
      <p>Lançamento de produção</p>
    </div>

    <div class="nav">
      <a href="dashboard.html">Dashboard</a>
      <a href="lancamento.html" class="ativo">Lançamento</a>
      <a href="historico.html">Histórico</a>
      <button id="btnSair" type="button">Sair</button>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2>Lançamento</h2>
      <div id="msg" class="msg info">Validando sessão...</div>

      <label for="usuario">Usuário</label>
      <select id="usuario">
        <option value="">Carregando usuários...</option>
      </select>

      <label for="obra">Obra</label>
      <select id="obra">
        <option value="">Carregando obras...</option>
      </select>

      <label for="bloco">Bloco</label>
      <select id="bloco">
        <option value="">Selecione a obra</option>
      </select>

      <label for="servico">Serviço</label>
      <select id="servico">
        <option value="">Carregando serviços...</option>
      </select>

      <label for="quantidade">Quantidade</label>
      <input id="quantidade" type="number" step="0.01" min="0" placeholder="Digite a quantidade" />

      <button id="btnSalvar" class="form-btn" type="button">Salvar</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://mhgcuzltxwkzezonqcyz.supabase.co";
    const SUPABASE_KEY = "sb_publishable_aUXMKggmg99icSo5hRUZUg_2WF_qdEA";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const elUsuario = document.getElementById("usuario");
    const elObra = document.getElementById("obra");
    const elBloco = document.getElementById("bloco");
    const elServico = document.getElementById("servico");
    const elQuantidade = document.getElementById("quantidade");
    const elMsg = document.getElementById("msg");
    const elBtnSalvar = document.getElementById("btnSalvar");
    const elBtnSair = document.getElementById("btnSair");

    function setMsg(texto, tipo = "info") {
      elMsg.textContent = texto;
      elMsg.className = "msg " + tipo;
    }

    function preencherSelect(select, dados, placeholder) {
      select.innerHTML = "";
      const optInicial = document.createElement("option");
      optInicial.value = "";
      optInicial.textContent = placeholder;
      select.appendChild(optInicial);

      (dados || []).forEach(item => {
        const opt = document.createElement("option");
        opt.value = item.id;
        opt.textContent = item.nome || item.id;
        select.appendChild(opt);
      });
    }

    async function protegerPagina() {
      try {
        const { data, error } = await supabaseClient.auth.getSession();
        if (error || !data?.session) {
          window.location.replace("login.html");
          return null;
        }
        return data.session;
      } catch (err) {
        window.location.replace("login.html");
        return null;
      }
    }

    async function sair() {
      await supabaseClient.auth.signOut();
      window.location.replace("login.html");
    }

    async function carregarBlocos() {
      try {
        const obraId = elObra.value;

        if (!obraId) {
          preencherSelect(elBloco, [], "Selecione a obra");
          return;
        }

        setMsg("Carregando blocos...", "info");

        const { data, error } = await supabaseClient
          .from("blocos")
          .select("id, nome, obra_id")
          .eq("obra_id", obraId)
          .order("nome", { ascending: true });

        if (error) throw error;

        preencherSelect(elBloco, data, data?.length ? "Selecione o bloco" : "Nenhum bloco encontrado");
        setMsg("Blocos carregados.", "ok");
      } catch (error) {
        preencherSelect(elBloco, [], "Erro ao carregar blocos");
        setMsg("Erro ao carregar blocos: " + error.message, "erro");
      }
    }

    async function carregarDados() {
      try {
        setMsg("Carregando dados...", "info");

        const [usuariosRes, obrasRes, servicosRes] = await Promise.all([
          supabaseClient.from("usuarios").select("id, nome").order("nome", { ascending: true }),
          supabaseClient.from("obras").select("id, nome").order("nome", { ascending: true }),
          supabaseClient.from("tipos_servico").select("id, nome").order("nome", { ascending: true })
        ]);

        if (usuariosRes.error) throw new Error("Usuários: " + usuariosRes.error.message);
        if (obrasRes.error) throw new Error("Obras: " + obrasRes.error.message);
        if (servicosRes.error) throw new Error("Serviços: " + servicosRes.error.message);

        preencherSelect(elUsuario, usuariosRes.data, usuariosRes.data?.length ? "Selecione o usuário" : "Nenhum usuário encontrado");
        preencherSelect(elObra, obrasRes.data, obrasRes.data?.length ? "Selecione a obra" : "Nenhuma obra encontrada");
        preencherSelect(elServico, servicosRes.data, servicosRes.data?.length ? "Selecione o serviço" : "Nenhum serviço encontrado");
        preencherSelect(elBloco, [], "Selecione a obra");

        setMsg("Dados carregados com sucesso.", "ok");
      } catch (error) {
        setMsg("Erro ao carregar dados: " + error.message, "erro");
      }
    }

    async function salvar() {
      try {
        const usuarioId = elUsuario.value;
        const obraId = elObra.value;
        const blocoId = elBloco.value;
        const servicoId = elServico.value;
        const quantidade = Number(elQuantidade.value);

        if (!usuarioId) return setMsg("Selecione o usuário.", "erro");
        if (!obraId) return setMsg("Selecione a obra.", "erro");
        if (!blocoId) return setMsg("Selecione o bloco.", "erro");
        if (!servicoId) return setMsg("Selecione o serviço.", "erro");
        if (!quantidade || quantidade <= 0) return setMsg("Digite uma quantidade válida.", "erro");

        elBtnSalvar.disabled = true;
        setMsg("Salvando lançamento...", "info");

        const { error } = await supabaseClient.from("lancamentos_producao").insert([{
          usuario_id: usuarioId,
          obra_id: obraId,
          bloco_id: blocoId,
          tipo_servico_id: servicoId,
          quantidade: quantidade,
          status: "pendente"
        }]);

        if (error) throw error;

        elQuantidade.value = "";
        setMsg("Lançamento salvo com sucesso.", "ok");
      } catch (error) {
        setMsg("Erro ao salvar lançamento: " + error.message, "erro");
      } finally {
        elBtnSalvar.disabled = false;
      }
    }

    elObra.addEventListener("change", carregarBlocos);
    elBtnSalvar.addEventListener("click", salvar);
    elBtnSair.addEventListener("click", sair);

    (async function iniciar() {
      const sessao = await protegerPagina();
      if (!sessao) return;
      await carregarDados();
    })();
  </script>
</body>
</html>
